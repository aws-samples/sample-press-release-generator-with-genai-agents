# CORS Configuration for Nginx
# This file handles Cross-Origin Resource Sharing (CORS) headers

# Map origin to allowed CORS origin
map $http_origin $cors_origin {
    default "";
    
    # Development origins
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
    "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    "~^https?://0\.0\.0\.0(:[0-9]+)?$" $http_origin;
    
    # Production origins - AWS services
    "~^https://[a-z0-9-]+\.cloudfront\.net$" $http_origin;
    "~^https://[a-z0-9-]+\.elb\.[a-z0-9-]+\.amazonaws\.com$" $http_origin;
    "~^https://[a-z0-9-]+\.execute-api\.[a-z0-9-]+\.amazonaws\.com$" $http_origin;
    "~^https://[a-z0-9-]+\.s3-website-[a-z0-9-]+\.amazonaws\.com$" $http_origin;
    
    # Custom domain patterns (if CORS_DOMAIN_PATTERN environment variable is set)
    # This would need to be dynamically configured based on deployment
}

# Map request method to appropriate CORS method header
map $request_method $cors_method {
    default "GET, POST, PUT, DELETE, OPTIONS, PATCH";
    OPTIONS "GET, POST, PUT, DELETE, OPTIONS, PATCH";
}

# Map request to appropriate CORS headers
map $request_method $cors_headers {
    default "Accept, Accept-Language, Content-Language, Content-Type, Authorization, X-Requested-With, X-API-Key, Cache-Control";
    OPTIONS "Accept, Accept-Language, Content-Language, Content-Type, Authorization, X-Requested-With, X-API-Key, Cache-Control";
}

# CORS headers to be included in location blocks
# Usage: include /etc/nginx/cors.conf; in location blocks

# Set CORS headers for all responses
add_header Access-Control-Allow-Origin $cors_origin always;
add_header Access-Control-Allow-Methods $cors_method always;
add_header Access-Control-Allow-Headers $cors_headers always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Max-Age "86400" always;

# Additional security headers
add_header Vary "Origin, Access-Control-Request-Method, Access-Control-Request-Headers" always;

